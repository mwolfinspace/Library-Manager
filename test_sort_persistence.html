<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sort Persistence Test</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                padding: 20px;
                max-width: 800px;
                margin: 0 auto;
            }
            .test-section {
                margin-bottom: 30px;
                padding: 15px;
                border: 1px solid #ddd;
                border-radius: 5px;
            }
            h2 {
                color: #333;
            }
            button {
                padding: 8px 16px;
                margin: 5px;
                cursor: pointer;
                background-color: #f0f0f0;
                border: 1px solid #ccc;
                border-radius: 4px;
            }
            button.active {
                background-color: #4caf50;
                color: white;
            }
            .results {
                margin-top: 10px;
                padding: 10px;
                background-color: #f9f9f9;
                border-radius: 4px;
            }
            .test-case {
                margin-bottom: 15px;
            }
        </style>
    </head>
    <body>
        <h1>Sort Persistence Test</h1>

        <div class="test-section">
            <h2>Test Sort Buttons</h2>
            <div class="sort-toggle">
                <button class="sort-btn" data-sort="default" type="button">
                    Default
                </button>
                <button class="sort-btn" data-sort="title" type="button">
                    Title
                </button>
                <button class="sort-btn" data-sort="recent" type="button">
                    Recent
                </button>
                <button class="sort-btn" data-sort="priority" type="button">
                    Priority
                </button>
            </div>
            <div class="results" id="test-results"></div>
        </div>

        <div class="test-section">
            <h2>Test Data</h2>
            <div class="test-case">
                <h3>Sample Stories</h3>
                <div id="sample-stories"></div>
            </div>
        </div>

        <div class="test-section">
            <h2>LocalStorage Data</h2>
            <button id="clear-storage">Clear LocalStorage</button>
            <button id="show-storage">Show LocalStorage Data</button>
            <div class="results" id="storage-data"></div>
        </div>

        <script>
            // Mock data similar to the actual catalog
            const mockStories = [
                {
                    id: "story1",
                    title: "The Rubber Plant's Prey",
                    createdAt: "2026-02-10T18:54:56.3998700+07:00",
                    updatedAt: "2026-02-11T02:51:22.393Z",
                },
                {
                    id: "story2",
                    title: "Protective Suit",
                    createdAt: "2026-02-10T17:10:17.861Z",
                    updatedAt: "2026-02-11T02:51:22.393Z",
                },
                {
                    id: "story3",
                    title: "Ready To The Beach",
                    createdAt: "2026-02-10T17:14:05.747Z",
                    updatedAt: "2026-02-11T07:50:29.623Z",
                },
            ];

            // Mock functions from homepage.js
            let activeSort = "default";
            let titleSortDirection = "asc";

            function loadSortPreference() {
                try {
                    const raw = localStorage.getItem("homepageSort");
                    const sortData = raw
                        ? JSON.parse(raw)
                        : { type: "default", direction: "asc" };
                    return sortData;
                } catch (error) {
                    return { type: "default", direction: "asc" };
                }
            }

            function saveSortPreference(sortType, direction = "asc") {
                const sortData = { type: sortType, direction: direction };
                localStorage.setItem("homepageSort", JSON.stringify(sortData));
            }

            function applySortPreference(sortData) {
                if (!sortData) {
                    sortData = { type: "default", direction: "asc" };
                }

                activeSort = sortData.type || "default";
                titleSortDirection = sortData.direction || "asc";

                const buttons = document.querySelectorAll(".sort-btn");
                buttons.forEach((button) => {
                    button.classList.toggle(
                        "active",
                        button.dataset.sort === activeSort,
                    );
                    if (
                        button.dataset.sort === "title" &&
                        activeSort === "title"
                    ) {
                        button.textContent =
                            titleSortDirection === "asc"
                                ? "Title A-Z"
                                : "Title Z-A";
                    }
                });
            }

            function storyTitle(story) {
                return story.title || story.id;
            }

            function sortStories(list) {
                const sorted = [...list];
                if (activeSort === "title") {
                    const direction = titleSortDirection === "asc" ? 1 : -1;
                    sorted.sort(
                        (a, b) =>
                            storyTitle(a).localeCompare(storyTitle(b)) *
                            direction,
                    );
                } else if (activeSort === "recent") {
                    // Mock recent sorting - in real app this would use bookmark timestamps
                    sorted.sort(
                        (a, b) => new Date(b.updatedAt) - new Date(a.updatedAt),
                    );
                } else if (activeSort === "priority") {
                    // Mock priority sorting - in real app this would use favorites and bookmarks
                    sorted.sort((a, b) =>
                        storyTitle(a).localeCompare(storyTitle(b)),
                    );
                }
                // Default sort would be by displayOrder
                return sorted;
            }

            function displayStories(stories) {
                const container = document.getElementById("sample-stories");
                container.innerHTML = "";

                const sorted = sortStories(stories);

                sorted.forEach((story, index) => {
                    const div = document.createElement("div");
                    div.textContent = `${index + 1}. ${story.title} (Created: ${story.createdAt})`;
                    container.appendChild(div);
                });
            }

            // Initialize
            document.addEventListener("DOMContentLoaded", () => {
                // Set up sort buttons
                const sortButtons = document.querySelectorAll(".sort-btn");
                sortButtons.forEach((button) => {
                    button.addEventListener("click", () => {
                        const sortType = button.dataset.sort;

                        if (sortType === "title" && activeSort === "title") {
                            // Toggle title sort direction
                            titleSortDirection =
                                titleSortDirection === "asc" ? "desc" : "asc";
                            button.textContent =
                                titleSortDirection === "asc"
                                    ? "Title A-Z"
                                    : "Title Z-A";
                        } else {
                            // Reset title sort direction for new sort type
                            titleSortDirection = "asc";
                            sortButtons.forEach((btn) => {
                                if (btn.dataset.sort === "title") {
                                    btn.textContent = "Title";
                                }
                            });
                        }

                        sortButtons.forEach((btn) =>
                            btn.classList.remove("active"),
                        );
                        button.classList.add("active");
                        activeSort = sortType;
                        saveSortPreference(activeSort, titleSortDirection);

                        // Update display
                        displayStories(mockStories);

                        // Show test results
                        const results = document.getElementById("test-results");
                        results.innerHTML = `
                        <p><strong>Active Sort:</strong> ${activeSort}</p>
                        <p><strong>Title Direction:</strong> ${titleSortDirection}</p>
                        <p><strong>Saved Data:</strong> ${JSON.stringify(loadSortPreference())}</p>
                    `;
                    });
                });

                // Set up storage buttons
                document
                    .getElementById("clear-storage")
                    .addEventListener("click", () => {
                        localStorage.removeItem("homepageSort");
                        document.getElementById("storage-data").textContent =
                            "LocalStorage cleared!";
                    });

                document
                    .getElementById("show-storage")
                    .addEventListener("click", () => {
                        const data = loadSortPreference();
                        document.getElementById("storage-data").innerHTML = `
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                    });

                // Initialize with saved preferences
                applySortPreference(loadSortPreference());
                displayStories(mockStories);

                // Show initial state
                const results = document.getElementById("test-results");
                results.innerHTML = `
                <p><strong>Active Sort:</strong> ${activeSort}</p>
                <p><strong>Title Direction:</strong> ${titleSortDirection}</p>
                <p><strong>Saved Data:</strong> ${JSON.stringify(loadSortPreference())}</p>
            `;
            });
        </script>
    </body>
</html>
