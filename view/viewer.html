<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer</title>
    <link rel="stylesheet" href="viewer.css">
    <link rel="stylesheet" href="../css/fonts.css">
</head>
<body>
    <div class="code-field" aria-hidden="true"></div>
    <div class="viewer">
        <div class="image-layer">
            <div class="image-hud" aria-hidden="true">
                <span class="hud-mark tl"></span>
                <span class="hud-mark tr"></span>
                <span class="hud-mark bl"></span>
                <span class="hud-mark br"></span>
            </div>
            <div id="image-fallback" class="image-fallback" hidden>Image missing</div>
            <img id="photo" src="" alt="Photo">
            <div class="image-controls">
                <button id="prev-btn" class="control-btn" type="button" title="Previous image" aria-label="Previous image">◀️</button>
                <button id="zoom-out-btn" class="control-btn" type="button" title="Zoom out" aria-label="Zoom out">➖</button>
                <button id="zoom-in-btn" class="control-btn" type="button" title="Zoom in" aria-label="Zoom in">➕</button>
                <button id="fit-view-btn" class="control-btn" type="button" title="Fit" aria-label="Fit">⛶</button>
                <button id="next-btn" class="control-btn" type="button" title="Next image" aria-label="Next image">▶️</button>
                <span id="image-counter" class="image-counter">0 / 0</span>
            </div>
        </div>
        <div id="blackout" class="blackout" hidden>
            <div class="blackout-content" aria-live="polite">
                <div class="blackout-binary" id="blackout-time">00:00:00</div>
                <div class="blackout-text">Press spacebar again to resume</div>
            </div>
        </div>

        <header class="viewer-toolbar">
            <button id="prev-story-btn" class="icon-btn" title="Previous story" aria-label="Previous story">⟵</button>
            <button id="next-story-btn" class="icon-btn" title="Next story" aria-label="Next story">⟶</button>
            <button id="font-down-btn" class="icon-btn" title="Decrease font size" aria-label="Decrease font size">➖</button>
            <button id="font-up-btn" class="icon-btn" title="Increase font size" aria-label="Increase font size">➕</button>
            <button id="theme-toggle-btn" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">🌙</button>
            <button id="favorite-btn" class="icon-btn" title="Favorite" aria-label="Favorite">☆</button>
            <button id="bookmark-btn" class="icon-btn" title="Bookmark" aria-label="Bookmark">🔖</button>
            <button id="settings-btn" class="icon-btn" type="button" title="Settings" aria-label="Settings">⚙️</button>
            <a class="icon-btn" href="../homepage.html" title="Library" aria-label="Library">🏠</a>
        </header>

        <main class="viewer-body">
            <section class="story-panel">
                <div class="story-header">
                    <p class="eyebrow">Report Viewer</p>
                    <h1 id="story-title">Story</h1>
                    <p id="story-meta" class="story-meta"></p>
                </div>
                <div id="story-content" class="story-content"></div>
            </section>
        </main>
    </div>

    <div class="settings-overlay" id="settings-overlay" hidden>
        <div class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
            <div class="settings-header">
                <h2 id="settings-title">Viewer Settings</h2>
                <button id="close-settings" class="ghost" type="button">Close</button>
            </div>
            <div class="settings-tabs" role="tablist">
                <button class="tab-btn active" data-tab="appearance" type="button" role="tab" aria-selected="true">Appearance</button>
                <button class="tab-btn" data-tab="reading" type="button" role="tab" aria-selected="false">Reading</button>
                <button class="tab-btn" data-tab="input" type="button" role="tab" aria-selected="false">Input</button>
                <button class="tab-btn" data-tab="shortcuts" type="button" role="tab" aria-selected="false">Shortcuts</button>
            </div>
            <div class="tab-panel active" data-tab-panel="appearance" role="tabpanel">
                <div class="settings-grid">
                    <label>
                        Theme
                        <select id="theme-select">
                            <option value="dark">Dark</option>
                            <option value="light">Light</option>
                        </select>
                    </label>

                    <label class="full">
                        Story Font
                        <select id="font-family">
                            <option value="tech">Share Tech Mono</option>
                            <option value="orbitron">Orbitron</option>
                            <option value="vt323">VT323</option>
                            <option value="system-mono">System Mono</option>
                            <option value="system-sans">System Sans</option>
                            <option value="system-serif">System Serif</option>
                        </select>
                    </label>

                    <label class="full">
                        Custom Font (optional)
                        <input type="text" id="custom-font" placeholder="e.g. 'Fira Code', monospace">
                    </label>
                </div>
            </div>

            <div class="tab-panel" data-tab-panel="reading" role="tabpanel" hidden>
                <div class="settings-grid">
                    <label>
                        Font Size
                        <input type="range" id="font-size" min="14" max="26" step="1">
                    </label>

                    <label>
                        Line Spacing
                        <input type="range" id="line-spacing" min="1.2" max="2.2" step="0.1">
                    </label>

                    <label>
                        Scroll Step
                        <select id="scroll-step">
                            <option value="20">20 px</option>
                            <option value="40">40 px</option>
                            <option value="60">60 px</option>
                            <option value="80">80 px</option>
                        </select>
                    </label>

                    <label>
                        Zoom Step
                        <select id="zoom-step">
                            <option value="0.05">0.05</option>
                            <option value="0.1">0.1</option>
                            <option value="0.2">0.2</option>
                        </select>
                    </label>
                </div>
            </div>

            <div class="tab-panel" data-tab-panel="input" role="tabpanel" hidden>
                <div class="settings-grid">
                    <label>
                        Keyboard Mode
                        <select id="keyboard-mode">
                            <option value="default">Default</option>
                            <option value="left">One-Hand Left</option>
                            <option value="right">One-Hand Right</option>
                        </select>
                    </label>

                <label class="checkbox">
                    <input type="checkbox" id="pan-keys">
                    Enable Pan Keys (WASD / Arrows)
                </label>

                <label class="checkbox">
                    <input type="checkbox" id="remember-zoom">
                    Remember Zoom Per Story
                </label>

                <label class="checkbox">
                    <input type="checkbox" id="remember-view-all">
                    Remember View Across All Stories
                </label>
            </div>
            </div>

            <div class="tab-panel" data-tab-panel="shortcuts" role="tabpanel" hidden>
                <div class="shortcuts" id="shortcut-list"></div>
                <div class="keybinds" id="keybind-list"></div>
            </div>
        </div>
    </div>

    <script src="../database/fonts.js"></script>
    <script src="../database/catalog.js"></script>
    <script src="viewer.js"></script>
</body>
</html>
